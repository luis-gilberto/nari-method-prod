<!DOCTYPE html>
<html lang="es" data-theme="light" style=""><head><meta charset="utf-8">
    
    
    <title>Pantalla → Parar sin pelea</title>
    <style>
      :root {
        /* Color Palette */
        --bg-color: #171515;
        --bg-glow-top: rgba(78, 168, 154, 0.08);
        --bg-glow-bottom: rgba(224, 122, 95, 0.08);

        --surface-base: rgba(37, 33, 33, 0.7);
        --surface-hover: rgba(48, 43, 43, 0.9);
        --surface-alt: rgba(255, 255, 255, 0.04);

        --text-main: #f8f3ef;
        --text-muted: #b7aea8;
        --text-soft: #958b85;

        --accent-coral: #e07a5f;
        --accent-teal: #4ea89a;

        --border-soft: rgba(255, 255, 255, 0.08);
        --border-strong: rgba(78, 168, 154, 0.4);

        --shadow-soft: 0 12px 32px rgba(0, 0, 0, 0.2);

        /* Spacing & Radii */
        --radius-md: 14px;
        --radius-lg: 20px;

        --spacing-xs: 6px;
        --spacing-sm: 12px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-xl: 32px;

        --transition: 250ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background-color: var(--bg-color);
        background-image:
          radial-gradient(circle at 10% 0%, var(--bg-glow-top), transparent 50%),
          radial-gradient(circle at 90% 100%, var(--bg-glow-bottom), transparent 50%);
        background-attachment: fixed;
        color: var(--text-main);
        line-height: 1.5;
        min-height: 100%;
        /* Account for fixed footer */
        padding-bottom: calc(80px + env(safe-area-inset-bottom));
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .app-shell {
        width: 100%;
        max-width: 760px;
        padding: clamp(24px, 5vw, 40px) 20px;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xl);
      }

      /* Header */
      header {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-sm);
      }

      .brand-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-soft);
        font-weight: 600;
      }

      h1 {
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        font-weight: 700;
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: clamp(1.05rem, 3vw, 1.25rem);
        color: var(--text-muted);
        max-width: 36ch;
      }

      .reminder {
        margin-top: var(--spacing-sm);
        font-size: 0.95rem;
        color: var(--text-soft);
        font-weight: 500;
        border-left: 2px solid var(--accent-coral);
        padding-left: var(--spacing-sm);
      }

      /* Action Cards */
      .cards-section {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--spacing-md);
      }

      @media (min-width: 640px) {
        .cards-section {
          grid-template-columns: repeat(3, 1fr);
          align-items: stretch;
        }
      }

      .action-card {
        background-color: var(--surface-base);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius-lg);
        padding: var(--spacing-lg);
        text-align: left;
        color: inherit;
        cursor: pointer;
        font-family: inherit;
        position: relative;
        transition: all var(--transition);
        display: flex;
        flex-direction: column;
        gap: var(--spacing-md);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
      }

      .action-card:focus-visible {
        outline: none;
        border-color: var(--accent-teal);
        box-shadow: 0 0 0 3px rgba(78, 168, 154, 0.25);
      }

      .card-title {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-soft);
        font-weight: 700;
      }

      .card-phrase {
        font-size: clamp(1.15rem, 3vw, 1.3rem);
        font-weight: 400;
        line-height: 1.35;
        color: var(--text-muted);
        transition:
          color var(--transition),
          font-weight var(--transition);
        flex-grow: 1;
      }

      .card-helper {
        font-size: 0.9rem;
        color: var(--text-soft);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-helper::before {
        content: '';
        display: block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: currentColor;
        opacity: 0.4;
      }

      /* Selected State */
      .action-card[aria-pressed='true'] {
        background-color: var(--surface-hover);
        border-color: var(--border-strong);
        box-shadow:
          var(--shadow-soft),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transform: translateY(-2px);
      }

      .action-card[aria-pressed='true'] .card-phrase {
        color: var(--text-main);
        font-weight: 600;
      }

      .action-card[aria-pressed='true'] .card-helper {
        color: var(--text-muted);
      }

      .action-card[aria-pressed='true'] .card-helper::before {
        background-color: var(--accent-teal);
        opacity: 1;
      }

      /* Collapsible Section */
      .collapsible-wrapper {
        border-top: 1px solid var(--border-soft);
        padding-top: var(--spacing-sm);
      }

      .collapsible-trigger {
        width: 100%;
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 1.05rem;
        font-family: inherit;
        font-weight: 500;
        padding: var(--spacing-sm) 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        text-align: left;
      }

      .collapsible-trigger:focus-visible {
        outline: none;
        color: var(--accent-teal);
        border-radius: 8px;
        box-shadow: 0 0 0 2px rgba(78, 168, 154, 0.25);
      }

      .collapsible-icon {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
        transition: transform var(--transition);
        opacity: 0.7;
      }

      .collapsible-trigger[aria-expanded='true'] .collapsible-icon {
        transform: rotate(180deg);
      }

      .collapsible-content {
        display: grid;
        grid-template-rows: 0fr;
        transition:
          grid-template-rows var(--transition),
          opacity var(--transition);
        opacity: 0;
      }

      .collapsible-trigger[aria-expanded='true'] + .collapsible-content {
        grid-template-rows: 1fr;
        opacity: 1;
      }

      .collapsible-inner {
        overflow: hidden;
      }

      .collapsible-box {
        margin-top: var(--spacing-md);
        background-color: var(--surface-alt);
        padding: var(--spacing-lg);
        border-radius: var(--radius-md);
        color: var(--text-main);
        font-size: 1.05rem;
      }

      /* Sticky Footer */
      .sticky-footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(23, 21, 21, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border-soft);
        padding: 16px env(safe-area-inset-right) calc(16px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
        text-align: center;
        z-index: 10;
      }

      .footer-text {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-muted);
        letter-spacing: 0.03em;
      }

      .footer-text span {
        color: var(--text-main);
      }

      .footer-arrow {
        opacity: 0.4;
        margin: 0 6px;
        font-weight: 400;
      }
    </style>
  </head>
  <body style="">
    <main class="app-shell">
      <header>
        <div class="brand-label">Criar Sin Culpas</div>
        <h1>Pantalla → Parar sin pelea</h1>
        <p class="subtitle">No tienes que hacerlo perfecto. Solo necesitas un siguiente paso.</p>
        <p class="reminder">No expliques demasiado. No negocies. Quédate cerca.</p>
      </header>

      <section class="cards-section" aria-label="Opciones de respuesta">
        <button class="action-card" aria-pressed="false">
          <span class="card-title">Suave</span>
          <span class="card-phrase">5 minutos más y luego tú eliges qué hacemos</span>
          <span class="card-helper">Todo está tranquilo.</span>
        </button>

        <button class="action-card" aria-pressed="true">
          <span class="card-title">Guiado</span>
          <span class="card-phrase">Sé que quieres seguir. Es difícil parar. Vamos a parar juntos.</span>
          <span class="card-helper">Empieza la resistencia.</span>
        </button>

        <button class="action-card" aria-pressed="false">
          <span class="card-title">Firme + Calma</span>
          <span class="card-phrase">Veo que estás molesto. Es hora de parar. Estoy aquí contigo.</span>
          <span class="card-helper">Ya hay llanto o enojo.</span>
        </button>
      </section>

      <section class="collapsible-wrapper">
        <button class="collapsible-trigger" aria-expanded="false" aria-controls="after-content">
          Después (cuando todo se calme)
          <svg class="collapsible-icon" viewBox="0 0 24 24">
            <polyline points="6 9 12 15 18 9" stroke-linecap="round" stroke-linejoin="round"></polyline>
          </svg>
        </button>
        <div id="after-content" class="collapsible-content">
          <div class="collapsible-inner">
            <div class="collapsible-box">Eso fue difícil, ¿verdad?</div>
          </div>
        </div>
      </section>
    </main>

    <footer class="sticky-footer">
      <div class="footer-text">
        <span>Avisa</span><span class="footer-arrow">→</span><span>Valida</span><span class="footer-arrow">→</span><span>Guía</span><span class="footer-arrow">→</span><span>Sostén</span>
      </div>
    </footer>
